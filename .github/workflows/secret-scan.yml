name: secret-scan

# Scans the FULL git history for committed secrets (keys, tokens, credentials)
# on every push and PR. This is a CHECK ONLY — it never builds or deploys, so it
# does not touch the Vercel deploy path (push `main` is still the deploy). It is
# the server-side backstop for the local .githooks/pre-commit scan; because this
# is a public repo, a leaked secret must be caught fast (and rotated — deleting
# it does not remove it from history).

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install gitleaks
        # gitleaks' Go module path stayed github.com/zricethezav/gitleaks even
        # after the GitHub org rename — `go install` must use the declared path.
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Scan git history for secrets
        run: gitleaks git . --redact --verbose
